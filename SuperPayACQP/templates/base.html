{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SuperPayACQP{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Shared CSS -->
    <link rel="stylesheet" href="{% static 'css/shared.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div id="loadingMessage">Loading...</div>
    </div>
    
    <!-- Confirmation Dialog -->
    <div class="modal fade" id="confirmDialog" tabindex="-1" aria-labelledby="confirmDialogTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmDialogTitle">
                        <i class="bi bi-question-circle me-2"></i>
                        <span id="confirmDialogTitleText">Confirm Action</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-start">
                        <div class="icon-wrapper me-3">
                            <i class="bi bi-exclamation-triangle"></i>
                        </div>
                        <div>
                            <p id="confirmDialogMessage" style="margin: 0; color: var(--text-primary); font-size: 15px; line-height: 1.5;">
                                Are you sure you want to proceed?
                            </p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="padding: 10px 24px; border-radius: var(--radius-md); font-weight: 500;">
                        <i class="bi bi-x-lg me-1"></i> Cancel
                    </button>
                    <button type="button" class="btn" id="confirmDialogConfirmBtn" style="background-color: var(--primary-color); color: white; padding: 10px 24px; border-radius: var(--radius-md); font-weight: 500;">
                        <i class="bi bi-check-lg me-1"></i> <span id="confirmDialogConfirmText">Confirm</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Message Dialog -->
    <div class="modal fade" id="messageDialog" tabindex="-1" aria-labelledby="messageDialogTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header" id="messageDialogHeader">
                    <h5 class="modal-title" id="messageDialogTitle">
                        <i class="bi me-2" id="messageDialogIcon"></i>
                        <span id="messageDialogTitleText">Message</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex align-items-start">
                        <div class="icon-wrapper me-3" id="messageDialogIconWrapper">
                            <i class="bi" id="messageDialogIconLarge"></i>
                        </div>
                        <div>
                            <p id="messageDialogMessage" style="margin: 0; color: var(--text-primary); font-size: 15px; line-height: 1.5;">
                                Message content goes here.
                            </p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" id="messageDialogOkBtn" data-bs-dismiss="modal" style="padding: 10px 24px; border-radius: var(--radius-md); font-weight: 500;">
                        <i class="bi bi-check-lg me-1"></i> OK
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
    
    <!-- ============================================
         Global JavaScript Utilities
         ============================================ -->
    <script>
        /**
         * Show loading overlay
         * @param {string} message - Optional loading message (default: "Loading...")
         */
        function showLoading(message = 'Loading...') {
            const overlay = document.getElementById('loadingOverlay');
            const messageEl = document.getElementById('loadingMessage');
            if (messageEl) {
                messageEl.textContent = message;
            }
            if (overlay) {
                overlay.style.display = 'flex';
            }
        }
        
        /**
         * Hide loading overlay
         */
        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.display = 'none';
            }
        }
        
        /**
         * Get cookie value by name
         * @param {string} name - Cookie name
         * @returns {string|null} Cookie value or null
         */
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        /**
         * Show confirmation dialog
         * @param {Object} options - Dialog options
         * @param {string} options.title - Dialog title
         * @param {string} options.message - Dialog message
         * @param {string} options.confirmText - Confirm button text
         * @param {string} options.confirmClass - Additional CSS class for confirm button
         * @param {Function} options.onConfirm - Callback when confirmed
         * @param {Function} options.onCancel - Callback when cancelled
         * @returns {bootstrap.Modal} Modal instance
         */
        function showConfirmDialog(options = {}) {
            const defaults = {
                title: 'Confirm Action',
                message: 'Are you sure you want to proceed?',
                confirmText: 'Confirm',
                confirmClass: '',
                onConfirm: function() {},
                onCancel: function() {}
            };
            
            const settings = { ...defaults, ...options };
            
            const dialog = document.getElementById('confirmDialog');
            const titleText = document.getElementById('confirmDialogTitleText');
            const messageEl = document.getElementById('confirmDialogMessage');
            const confirmBtn = document.getElementById('confirmDialogConfirmBtn');
            const confirmText = document.getElementById('confirmDialogConfirmText');
            
            // Set dialog content
            titleText.textContent = settings.title;
            messageEl.textContent = settings.message;
            confirmText.textContent = settings.confirmText;
            
            // Reset and set confirm button class
            confirmBtn.className = 'btn';
            confirmBtn.style.backgroundColor = 'var(--primary-color)';
            confirmBtn.style.color = 'white';
            if (settings.confirmClass) {
                confirmBtn.classList.add(settings.confirmClass);
            }
            
            // Create Bootstrap modal
            const bsModal = new bootstrap.Modal(dialog, {
                backdrop: 'static',
                keyboard: false
            });
            
            // Handle confirm button click
            const handleConfirm = function() {
                bsModal.hide();
                settings.onConfirm();
                cleanup();
            };
            
            // Handle cancel
            const handleCancel = function() {
                settings.onCancel();
                cleanup();
            };
            
            // Cleanup event listeners
            const cleanup = function() {
                confirmBtn.removeEventListener('click', handleConfirm);
                dialog.removeEventListener('hidden.bs.modal', handleCancel);
            };
            
            // Add event listeners
            confirmBtn.addEventListener('click', handleConfirm);
            dialog.addEventListener('hidden.bs.modal', handleCancel, { once: true });
            
            // Show dialog
            bsModal.show();
            
            return bsModal;
        }
        
        /**
         * Show message dialog (success, error, warning, info)
         * @param {Object} options - Dialog options
         * @param {string} options.title - Dialog title
         * @param {string} options.message - Dialog message
         * @param {string} options.type - Message type: 'success', 'error', 'warning', 'info'
         * @param {string} options.buttonText - OK button text (default: "OK")
         * @param {Function} options.onClose - Callback when dialog is closed
         * @returns {bootstrap.Modal} Modal instance
         */
        function showMessageDialog(options = {}) {
            const defaults = {
                title: 'Message',
                message: 'Operation completed.',
                type: 'info',
                buttonText: 'OK',
                onClose: function() {}
            };
            
            const settings = { ...defaults, ...options };
            
            // Auto-detect type from title if not specified
            const titleLower = settings.title.toLowerCase();
            if (titleLower.includes('error') || titleLower.includes('failed') || titleLower.includes('fail')) {
                settings.type = 'error';
            } else if (titleLower.includes('success') || titleLower.includes('complete') || titleLower.includes('created') || titleLower.includes('updated') || titleLower.includes('deleted')) {
                settings.type = 'success';
            } else if (titleLower.includes('warning') || titleLower.includes('caution')) {
                settings.type = 'warning';
            }
            
            // Type configurations
            const typeConfigs = {
                success: {
                    headerBg: 'var(--success-color)',
                    iconClass: 'bi-check-circle-fill',
                    iconLargeClass: 'bi-check-lg',
                    iconWrapperBg: 'var(--success-bg)',
                    iconWrapperColor: 'var(--success-color)',
                    buttonBg: 'var(--success-color)'
                },
                error: {
                    headerBg: 'var(--error-color)',
                    iconClass: 'bi-x-circle-fill',
                    iconLargeClass: 'bi-x-lg',
                    iconWrapperBg: 'var(--error-bg)',
                    iconWrapperColor: 'var(--error-color)',
                    buttonBg: 'var(--error-color)'
                },
                warning: {
                    headerBg: 'var(--warning-color)',
                    iconClass: 'bi-exclamation-triangle-fill',
                    iconLargeClass: 'bi-exclamation-triangle',
                    iconWrapperBg: 'var(--warning-bg)',
                    iconWrapperColor: 'var(--warning-color)',
                    buttonBg: 'var(--warning-color)'
                },
                info: {
                    headerBg: 'var(--primary-color)',
                    iconClass: 'bi-info-circle-fill',
                    iconLargeClass: 'bi-info-lg',
                    iconWrapperBg: 'var(--info-bg)',
                    iconWrapperColor: 'var(--info-color)',
                    buttonBg: 'var(--primary-color)'
                }
            };
            
            const config = typeConfigs[settings.type] || typeConfigs.info;
            
            // Get dialog elements
            const dialog = document.getElementById('messageDialog');
            const header = document.getElementById('messageDialogHeader');
            const titleIcon = document.getElementById('messageDialogIcon');
            const titleText = document.getElementById('messageDialogTitleText');
            const iconWrapper = document.getElementById('messageDialogIconWrapper');
            const iconLarge = document.getElementById('messageDialogIconLarge');
            const messageEl = document.getElementById('messageDialogMessage');
            const okBtn = document.getElementById('messageDialogOkBtn');
            
            // Apply type-specific styles
            header.style.backgroundColor = config.headerBg;
            titleIcon.className = `bi ${config.iconClass} me-2`;
            iconWrapper.style.backgroundColor = config.iconWrapperBg;
            iconLarge.className = `bi ${config.iconLargeClass}`;
            iconLarge.style.color = config.iconWrapperColor;
            okBtn.style.backgroundColor = config.buttonBg;
            okBtn.style.color = 'white';
            
            // Set content
            titleText.textContent = settings.title;
            messageEl.textContent = settings.message;
            okBtn.innerHTML = `<i class="bi bi-check-lg me-1"></i> ${settings.buttonText}`;
            
            // Create Bootstrap modal
            const bsModal = new bootstrap.Modal(dialog, {
                backdrop: 'static',
                keyboard: false
            });
            
            // Handle close
            const handleClose = function() {
                settings.onClose();
                cleanup();
            };
            
            // Cleanup event listeners
            const cleanup = function() {
                dialog.removeEventListener('hidden.bs.modal', handleClose);
            };
            
            // Add event listener
            dialog.addEventListener('hidden.bs.modal', handleClose, { once: true });
            
            // Show dialog
            bsModal.show();
            
            return bsModal;
        }
        
        /**
         * Escape HTML to prevent XSS
         * @param {string} text - Text to escape
         * @returns {string} Escaped text
         */
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        /**
         * Format currency value
         * @param {number} value - Value in cents
         * @param {string} currency - Currency code (default: "MYR")
         * @returns {string} Formatted currency string
         */
        function formatCurrency(value, currency = 'MYR') {
            return `${currency} ${(value / 100).toFixed(2)}`;
        }
        
        /**
         * Format date
         * @param {string|Date} date - Date to format
         * @param {Object} options - Intl.DateTimeFormat options
         * @returns {string} Formatted date string
         */
        function formatDate(date, options = { year: 'numeric', month: 'short', day: 'numeric' }) {
            const d = typeof date === 'string' ? new Date(date) : date;
            return d.toLocaleDateString('en-US', options);
        }
        
        /**
         * Format date time
         * @param {string|Date} date - Date to format
         * @returns {string} Formatted date time string
         */
        function formatDateTime(date) {
            const d = typeof date === 'string' ? new Date(date) : date;
            return d.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
