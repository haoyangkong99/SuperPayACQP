<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>SuperPayACQP - Generate Entry Code</title>

    <style>

        .container-fluid {

        .sidebar {

            background-color: #f1f3f5;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .sidebar-header .logo {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }
        .sidebar-header h1 {
            font-size: 18px;
            margin: 0;
            color: #0b1f3b;
        }
        .sidebar-header p {
            font-size: 12px;
            color: #4a5f7b;
            margin: 0;
        }
        .sidebar-nav {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }
        .sidebar-nav li {
            margin: 15px 0;
        }
        .sidebar-nav a {
            text-decoration: none;
            color: #0b1f3b;
            font-size: 14px;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .sidebar-nav a:hover {
            background-color: #e9ecef;
        }
        .sidebar-nav a.active {
            background-color: #003b6b;
            color: white;
        }
        .sidebar-nav i {
            margin-right: 10px;
            font-size: 18px;
        }
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h2 {
            font-size: 32px;
            color: #0b1f3b;
            margin: 0;
        }
        .page-header p {
            font-size: 14px;
            color: #6c757d;
            margin: 10px 0 0 0;
        }
        .code-card {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .qr-placeholder {
            width: 180px;
            height: 180px;
            background-color: #f8f9fa;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #dee2e6;
        }
        .qr-placeholder i {
            font-size: 60px;
            color: #adb5bd;
        }
        .qr-code {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border-radius: 12px;
            background-color: white;
            padding: 10px;
        }
        .token-label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .token-value {
            font-size: 28px;
            font-weight: bold;
            color: #003b6b;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }
        .generate-btn {
            background-color: #003b6b;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .generate-btn:hover {
            background-color: #002a4f;
        }
        .generate-btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .code-validity {
            font-size: 13px;
            color: #6c757d;
            margin-top: 15px;
        }
        .code-validity i {
            color: #198754;
            margin-right: 5px;
        }
        .features-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }
        .feature-item {
            text-align: center;
        }
        .feature-item .icon {
            width: 50px;
            height: 50px;
            background-color: #e9ecef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        .feature-item .icon i {
            font-size: 20px;
            color: #003b6b;
        }
        .feature-item h4 {
            font-size: 14px;
            color: #0b1f3b;
            margin: 0 0 5px 0;
        }
        .feature-item p {
            font-size: 12px;
            color: #6c757d;
            margin: 0;
        }
        .alert-container {
            margin-bottom: 20px;
        }
        .merchant-select {
            margin-bottom: 20px;
        }
        .merchant-select label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #003b6b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .merchant-select select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            font-size: 14px;
        }
        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
        }
        .user-info .avatar {
            width: 40px;
            height: 40px;
            background-color: #003b6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 15px;
        }
        .user-info .details h5 {
            margin: 0;
            font-size: 14px;
            color: #0b1f3b;
        }
        .user-info .details p {
            margin: 0;
            font-size: 12px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="sidebar">
            <div class="sidebar-header">
                <svg class="logo" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="60" height="60" rx="12" fill="#003b6b"/>
                    <path d="M15 30L25 40L45 20" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div>
                    <h1>Architect OMS</h1>
                    <p>PRECISION CURATOR</p>
                </div>
            </div>
            
            <ul class="sidebar-nav">
                <li><a href="/dashboard/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li><a href="#"><i class="bi bi-plus-circle"></i> Create Order</a></li>
                <li><a href="#"><i class="bi bi-list-ul"></i> View Orders</a></li>
                <li><a href="#"><i class="bi bi-box"></i> Manage Goods</a></li>
                <li><a href="#"><i class="bi bi-shop"></i> Manage Merchants</a></li>
                <li><a href="/generate-code/" class="active"><i class="bi bi-key"></i> Generate Codes</a></li>
                <li><a href="#"><i class="bi bi-truck"></i> New Dispatch</a></li>
                <li><a href="#"><i class="bi bi-question-circle"></i> Support</a></li>
                <li><a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
            </ul>
        </div>
        
        <div class="main-content">
            <div class="page-header">
                <h2>Generate Entry Code</h2>
                
            </div>
            
            <div class="code-card">
                <div class="alert-container" id="alertContainer"></div>
                
                <div class="merchant-select">
                    <label for="merchantId">Select Merchant</label>
                    <select id="merchantId" class="form-select">
                        <option value="">Loading merchants...</option>
                    </select>
                </div>
                
                <div class="qr-placeholder" id="qrPlaceholder">
                    <i class="bi bi-qr-code"></i>
                </div>
                <img id="qrCode" class="qr-code" style="display: none;" alt="QR Code">
                
                <div class="token-label">TOKEN VALUE</div>
                <div class="token-value" id="tokenValue">--- --- ---</div>
                
                <button class="generate-btn" id="generateBtn">
                    <i class="bi bi-arrow-clockwise"></i> Generate / Refresh Code
                </button>
                
                <div class="code-validity" id="codeValidity" style="display: none;">
                    <i class="bi bi-check-circle-fill"></i>
                    <span id="validityText">Code valid for 15 minutes.</span>
                </div>
            </div>

        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get CSRF token from cookie
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        // Format token for display
        function formatToken(token) {
            // Format as XXX-XXXX-XXX
            const clean = token.replace(/-/g, '').toUpperCase();
            if (clean.length >= 10) {
                return clean.substring(0, 3) + '-' + clean.substring(3, 7) + '-' + clean.substring(7, 10);
            }
            return token.toUpperCase();
        }
        
        // Load merchants
        async function loadMerchants() {
            try {
                const response = await fetch('/api/query/merchants');
                const data = await response.json();
                
                const select = document.getElementById('merchantId');
                select.innerHTML = '<option value="">Select a merchant</option>';
                
                if (data.merchants && data.merchants.length > 0) {
                    data.merchants.forEach(merchant => {
                        const option = document.createElement('option');
                        option.value = merchant.merchantId;
                        option.textContent = `${merchant.merchantId} - ${merchant.merchantName}`;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="">No merchants available</option>';
                }
            } catch (error) {
                console.error('Error loading merchants:', error);
                document.getElementById('merchantId').innerHTML = '<option value="">Error loading merchants</option>';
            }
        }
        
        // Generate entry code
        async function generateCode() {
            const merchantId = document.getElementById('merchantId').value;
            const alertContainer = document.getElementById('alertContainer');
            const generateBtn = document.getElementById('generateBtn');
            
            if (!merchantId) {
                alertContainer.innerHTML = `
                    <div class="alert alert-warning" role="alert">
                        Please select a merchant first.
                    </div>
                `;
                return;
            }
            
            // Disable button and show loading
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...';
            
            try {
                const csrftoken = getCookie('csrftoken');
                
                const response = await fetch('/api/generate-entry-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken,
                    },
                    body: JSON.stringify({ merchantId })
                });
                
                const data = await response.json();
                
                if (response.ok && data.entryCodeUrl) {
                    // Extract codeId from entryCodeUrl
                    const urlParams = new URLSearchParams(data.entryCodeUrl.split('?')[1]);
                    const codeId = urlParams.get('codeId');
                    
                    // Show QR code placeholder (in real implementation, generate QR)
                    document.getElementById('qrPlaceholder').style.display = 'none';
                    const qrCode = document.getElementById('qrCode');
                    qrCode.style.display = 'block';
                    // Use a QR code API to generate QR
                    qrCode.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(data.entryCodeUrl)}`;
                    
                    // Update token value
                    document.getElementById('tokenValue').textContent = formatToken(codeId || 'Generated');
                    
                    // Show validity with actual time
                    const codeValidity = document.getElementById('codeValidity');
                    const validityText = document.getElementById('validityText');
                    codeValidity.style.display = 'block';
                    
                    if (data.codeStartTime && data.codeExpireTime) {
                        const startTime = new Date(data.codeStartTime);
                        const expireTime = new Date(data.codeExpireTime);
                        const now = new Date();
                        
                        // Calculate remaining time
                        const diffMs = expireTime - now;
                        const diffMins = Math.floor(diffMs / 60000);
                        const diffHours = Math.floor(diffMins / 60);
                        const remainingMins = diffMins % 60;
                        
                        // Format times for display
                        const formatTime = (date) => {
                            return date.toLocaleTimeString('en-US', { 
                                hour: '2-digit', 
                                minute: '2-digit',
                                hour12: true 
                            });
                        };
                        
                        if (diffHours > 0) {
                            validityText.innerHTML = `<i class="bi bi-clock"></i> Valid until ${formatTime(expireTime)} (${diffHours}h ${remainingMins}m remaining)`;
                        } else if (diffMins > 0) {
                            validityText.innerHTML = `<i class="bi bi-clock"></i> Valid until ${formatTime(expireTime)} (${diffMins} minutes remaining)`;
                        } else {
                            validityText.innerHTML = `<i class="bi bi-exclamation-triangle"></i> Code expired`;
                        }
                    } else {
                        validityText.innerHTML = '<i class="bi bi-check-circle-fill"></i> Code generated successfully.';
                    }
                    
                    // Clear any alerts
                    alertContainer.innerHTML = '';
                } else {
                    const errorMsg = data.result?.resultMessage || data.error || 'Failed to generate code';
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger" role="alert">
                            ${errorMsg}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error generating code:', error);
                alertContainer.innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        An error occurred. Please try again.
                    </div>
                `;
            }
            
            // Re-enable button
            generateBtn.disabled = false;
            generateBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Generate / Refresh Code';
        }
        
        // Event listeners
        document.getElementById('generateBtn').addEventListener('click', generateCode);
        
        document.getElementById('logoutBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            
            try {
                const csrftoken = getCookie('csrftoken');
                
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken,
                    }
                });
            } catch (error) {
                console.error('Logout error:', error);
            }
            
            window.location.href = '/login/';
        });
        
        // Load merchants on page load
        loadMerchants();
    </script>
</body>
</html>
