{% extends 'base_sidebar.html' %}
{% load static %}

{% block title %}SuperPayACQP - Generate Entry Code{% endblock %}

{% block extra_css %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'css/generate_code.css' %}">
{% endblock %}

{% block main_content %}
<!-- Page Header -->
<div class="page-header">
    <h2>Generate Entry Code</h2>
</div>

<!-- Code Card -->
<div class="code-card">
    <!-- Alert Container -->
    <div id="alertContainer"></div>
    
    <!-- Merchant Select -->
    <div class="merchant-select">
        <label for="merchantId">Select Merchant</label>
        <select id="merchantId" class="form-select">
            <option value="">Loading merchants...</option>
        </select>
    </div>
    
    <!-- QR Code Display -->
    <div class="qr-placeholder" id="qrPlaceholder">
        <i class="bi bi-qr-code"></i>
    </div>
    <img id="qrCode" class="qr-code" style="display: none;" alt="QR Code">
    
    <!-- Generate Button -->
    <button class="generate-btn" id="generateBtn">
        <i class="bi bi-arrow-clockwise"></i> Generate / Refresh Code
    </button>
    
    <!-- Code Validity -->
    <div class="code-validity" id="codeValidity" style="display: none;">
        <span id="validityText"></span>
    </div>
</div>
{% endblock %}

{% block extra_js %}
{{ block.super }}
<script>
    /**
     * Format token for display
     * @param {string} token - Token to format
     * @returns {string} Formatted token
     */
    function formatToken(token) {
        const clean = token.replace(/-/g, '').toUpperCase();
        if (clean.length >= 10) {
            return clean.substring(0, 3) + '-' + clean.substring(3, 7) + '-' + clean.substring(7, 10);
        }
        return token.toUpperCase();
    }
    
    /**
     * Load merchants from API
     */
    async function loadMerchants() {
        try {
            const token=getCookie('token');
            const response = await fetch('/api/query/merchants',{
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer '+token
                }
            });
            const data = await response.json();
            
            const select = document.getElementById('merchantId');
            select.innerHTML = '<option value="">Select a merchant</option>';
            
            if (data.merchants && data.merchants.length > 0) {
                data.merchants.forEach(merchant => {
                    const option = document.createElement('option');
                    option.value = merchant.merchantId;
                    option.textContent = merchant.merchantId + ' - ' + merchant.merchantName;
                    select.appendChild(option);
                });
            } else {
                select.innerHTML = '<option value="">No merchants available</option>';
            }
        } catch (error) {
            console.error('Error loading merchants:', error);
            document.getElementById('merchantId').innerHTML = '<option value="">Error loading merchants</option>';
        }
    }
    
    /**
     * Generate entry code
     */
    async function generateCode() {
        const merchantId = document.getElementById('merchantId').value;
        const alertContainer = document.getElementById('alertContainer');
        const generateBtn = document.getElementById('generateBtn');
        
        if (!merchantId) {
            alertContainer.innerHTML = '<div class="alert alert-warning alert-custom" role="alert">Please select a merchant first.</div>';
            return;
        }
        
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...';
        
        try {
            const csrftoken = getCookie('csrftoken');
            const token=getCookie('token');
            const response = await fetch('/api/generate-entry-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken,
                    'Authorization': 'Bearer '+token
                },
                body: JSON.stringify({ merchantId })
            });
            
            const data = await response.json();
            
            if (response.ok && data.entryCodeUrl) {
                const urlParams = new URLSearchParams(data.entryCodeUrl.split('?')[1]);
                const codeId = urlParams.get('codeId');
                
                // Show QR code
                document.getElementById('qrPlaceholder').style.display = 'none';
                const qrCode = document.getElementById('qrCode');
                qrCode.style.display = 'block';
                qrCode.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(data.entryCodeUrl);
                
                // Show validity
                const codeValidity = document.getElementById('codeValidity');
                const validityText = document.getElementById('validityText');
                codeValidity.style.display = 'block';
                
                if (data.codeStartTime && data.codeExpireTime) {
                    const expireTime = new Date(data.codeExpireTime);
                    const now = new Date();
                    const diffMs = expireTime - now;
                    const diffMins = Math.floor(diffMs / 60000);
                    const diffHours = Math.floor(diffMins / 60);
                    const remainingMins = diffMins % 60;
                    
                    const formatTime = (date) => {
                        return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                    };
                    
                    if (diffHours > 0) {
                        validityText.innerHTML = '<i class="bi bi-clock"></i> Valid for '  + diffHours + 'hours ' + remainingMins + 'minutes ';
                    } else if (diffMins > 0) {
                        validityText.innerHTML = '<i class="bi bi-clock"></i> Valid for '  + diffMins + ' minutes)';
                    } else {
                        validityText.innerHTML = '<i class="bi bi-exclamation-triangle"></i> Code expired';
                    }
                } else {
                    validityText.innerHTML = '<i class="bi bi-check-circle-fill"></i> Code generated successfully.';
                }
                
                alertContainer.innerHTML = '';
            } else {
                const errorMsg = data.result?.resultMessage || data.error || 'Failed to generate code';
                alertContainer.innerHTML = '<div class="alert alert-danger alert-custom" role="alert">' + escapeHtml(errorMsg) + '</div>';
            }
        } catch (error) {
            console.error('Error generating code:', error);
            alertContainer.innerHTML = '<div class="alert alert-danger alert-custom" role="alert">An error occurred. Please try again.</div>';
        }
        
        generateBtn.disabled = false;
        generateBtn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Generate / Refresh Code';
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadMerchants();
        
        const generateBtn = document.getElementById('generateBtn');
        if (generateBtn) {
            generateBtn.addEventListener('click', generateCode);
        }
    });
</script>
{% endblock %}
